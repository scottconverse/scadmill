name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Stage source-built WASM for ephemeral verification
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: openscad-wasm-0a66508c67374febcfc814a73b5b948dd84a1ca3
          path: ${{ runner.temp }}/openscad-wasm-source
          github-token: ${{ github.token }}
          repository: scottconverse/scadmill
          run-id: 29529789154
      - name: Verify and stage ignored WASM runtime paths
        run: node scripts/stage-openscad-wasm-artifact.mjs "${{ runner.temp }}/openscad-wasm-source"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generated OpenSCAD parser is current
        run: pnpm check:generated
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint and architectural policy
        run: pnpm lint
      - name: Unit and integration tests
        run: pnpm test
      - name: Production build
        run: pnpm build
      - name: npm license policy
        run: pnpm check:licenses npm
      - name: OpenSCAD WASM workflow contract
        run: pnpm check:wasm-workflow
      - name: Provenance ledger
        run: pnpm check:provenance
        env:
          SCADMILL_PROVENANCE_BASE: ${{ github.event.pull_request.base.sha }}

  e2e:
    name: Browser acceptance (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Stage source-built WASM for ephemeral verification
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: openscad-wasm-0a66508c67374febcfc814a73b5b948dd84a1ca3
          path: ${{ runner.temp }}/openscad-wasm-source
          github-token: ${{ github.token }}
          repository: scottconverse/scadmill
          run-id: 29529789154
      - name: Verify and stage ignored WASM runtime paths
        run: node scripts/stage-openscad-wasm-artifact.mjs "${{ runner.temp }}/openscad-wasm-source"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install acceptance-test browser and Linux dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install acceptance-test browser
        if: runner.os == 'Windows'
        run: pnpm exec playwright install chromium
      - name: Browser acceptance tests
        run: pnpm test:e2e
      - name: Production static browser acceptance
        if: runner.os == 'Linux'
        env:
          SCADMILL_STATIC_BASE_PATH: /scadmill-evidence/
        run: pnpm test:e2e:production-static
      - name: M4 hosted browser evidence
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test-results/m4-hosted-artifacts
          pnpm test:e2e:m4-hosted 2>&1 | tee test-results/m4-hosted-artifacts/ci-command.log
      - name: Retain M4 hosted browser evidence
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: m4-hosted-browser-evidence
          path: test-results/m4-hosted-artifacts
          if-no-files-found: error

  parity:
    name: Native and WASM byte parity
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Stage source-built WASM for ephemeral verification
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: openscad-wasm-0a66508c67374febcfc814a73b5b948dd84a1ca3
          path: ${{ runner.temp }}/openscad-wasm-source
          github-token: ${{ github.token }}
          repository: scottconverse/scadmill
          run-id: 29529789154
      - name: Verify and stage ignored WASM runtime paths
        run: node scripts/stage-openscad-wasm-artifact.mjs "${{ runner.temp }}/openscad-wasm-source"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium
      - name: Install checksummed OpenSCAD snapshot
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "OpenSCAD-2026.06.12-x86-64.zip"
          Invoke-WebRequest -Uri "https://files.openscad.org/snapshots/OpenSCAD-2026.06.12-x86-64.zip" -OutFile $archive
          if ((Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash -ne "3AA51474EA66609FB3FAFA4AA7F2AB4B6FE3FF50C130184F11BBE3818F3EF5AA") {
            throw "The OpenSCAD parity archive checksum is invalid."
          }
          $root = Join-Path $env:RUNNER_TEMP "openscad-parity"
          Expand-Archive -LiteralPath $archive -DestinationPath $root
          $executable = Get-ChildItem -LiteralPath $root -Filter openscad.exe -Recurse -File | Select-Object -First 1 -ExpandProperty FullName
          if ((Get-FileHash -Algorithm SHA256 -LiteralPath $executable).Hash -ne "DE9A0C732C23C3FEB0B49CF938777AA0AEE3E206DB9E98571672CACC4816C524") {
            throw "The OpenSCAD parity executable checksum is invalid."
          }
          "SCADMILL_OPENSCAD=$executable" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SCADMILL_AC4_OPENSCAD=$executable" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Exact AC-4.a parity
        run: pnpm test:parity
      - name: Exact colored 3MF object and round-trip evidence
        run: pnpm exec vitest run tests/integration/colored-3mf-engine.test.ts --reporter=verbose
      - name: Headless CLI export smoke
        run: cargo test --locked --manifest-path src/desktop-shell/src-tauri/Cargo.toml --test headless_cli exports_a_named_parameter_set_to_3mf_without_a_display_server -- --ignored --nocapture
      - name: Retain raw and canonical parity evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ac4-parity-evidence
          path: test-results/ac4-parity
          if-no-files-found: warn

  native:
    name: Native checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Verify pinned Rust toolchain
        run: rustc --version | grep '^rustc 1.96.0 '
      - name: Rust format
        run: |
          cargo fmt --manifest-path src/native-engine/Cargo.toml -- --check
          cargo fmt --manifest-path src/desktop-shell/src-tauri/Cargo.toml -- --check
      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget \
            xvfb
      - name: Install checksummed OpenSCAD snapshot
        env:
          OPENSCAD_SHA256: 4e1739b3ec6314506ff6c5d34158143a2fc3ef857c9367b53d5e49ea2957e2bd
          OPENSCAD_URL: https://files.openscad.org/snapshots/OpenSCAD-2026.06.12-x86_64.AppImage
        run: |
          install -d "$RUNNER_TEMP/openscad"
          cd "$RUNNER_TEMP/openscad"
          curl --fail --location --retry 3 --output OpenSCAD.AppImage "$OPENSCAD_URL"
          echo "$OPENSCAD_SHA256  OpenSCAD.AppImage" | sha256sum --check --strict
          chmod +x OpenSCAD.AppImage
          ./OpenSCAD.AppImage --appimage-extract >/dev/null
          OPENSCAD_BIN="$RUNNER_TEMP/openscad/squashfs-root/AppRun"
          test -x "$OPENSCAD_BIN"
          echo "SCADMILL_OPENSCAD=$OPENSCAD_BIN" >> "$GITHUB_ENV"
          xvfb-run -a "$OPENSCAD_BIN" --version 2>&1 | grep '2026.06.12'
      - name: Rust lint
        run: |
          cargo clippy --locked --manifest-path src/native-engine/Cargo.toml --all-targets -- -D warnings
          cargo clippy --locked --manifest-path src/desktop-shell/src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Native engine tests
        run: xvfb-run -a cargo test --locked --manifest-path src/native-engine/Cargo.toml
      - name: Desktop shell check
        run: cargo check --locked --manifest-path src/desktop-shell/src-tauri/Cargo.toml
      - name: Desktop shell tests
        run: cargo test --locked --manifest-path src/desktop-shell/src-tauri/Cargo.toml
      - name: Headless CLI export smoke without a display server
        run: cargo test --locked --manifest-path src/desktop-shell/src-tauri/Cargo.toml --test headless_cli exports_a_named_parameter_set_to_3mf_without_a_display_server -- --ignored --nocapture
      - name: Rust license policy
        run: node scripts/check-licenses.mjs rust

  desktop-installers:
    name: Desktop installer (${{ matrix.bundle }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle: dmg
            pattern: '*.dmg'
            artifact_name: scadmill-macos-dmg
          - os: ubuntu-22.04
            bundle: appimage
            pattern: '*.AppImage'
            artifact_name: scadmill-linux-appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install Linux desktop build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget \
            xvfb \
            xdotool
      - run: pnpm install --frozen-lockfile
      - name: Build platform installer
        run: |
          rustc --version | grep '^rustc 1.96.0 '
          cd src/desktop-shell
          pnpm exec tauri build --bundles "${{ matrix.bundle }}" --ci -- --locked
      - name: Locate and hash platform installer
        shell: bash
        run: |
          bundle_dir="src/desktop-shell/src-tauri/target/release/bundle/${{ matrix.bundle }}"
          artifact_count="$(find "$bundle_dir" -type f -name "${{ matrix.pattern }}" | wc -l | tr -d ' ')"
          if [ "$artifact_count" -ne 1 ]; then
            echo "Expected exactly one ${{ matrix.pattern }} artifact; found $artifact_count." >&2
            exit 1
          fi
          artifact="$(find "$bundle_dir" -type f -name "${{ matrix.pattern }}" -print -quit)"
          echo "SCADMILL_DESKTOP_INSTALLER=$artifact" >> "$GITHUB_ENV"
          SCADMILL_DESKTOP_INSTALLER="$artifact" node --input-type=module -e '
            import { createHash } from "node:crypto";
            import { basename } from "node:path";
            import { readFileSync, writeFileSync } from "node:fs";
            const path = process.env.SCADMILL_DESKTOP_INSTALLER;
            if (!path) throw new Error("Installer path is missing.");
            const digest = createHash("sha256").update(readFileSync(path)).digest("hex");
            writeFileSync(`${path}.sha256`, `${digest}  ${basename(path)}\n`, "utf8");
          '
          cat "$artifact.sha256"
      - name: Record external signing status
        run: echo "Signing/notarization credentials are owner-side; retaining the required unsigned CI artifact."
      - name: Mount, launch, and remove macOS candidate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mount_point="$RUNNER_TEMP/scadmill-dmg"
          install_root="$RUNNER_TEMP/scadmill-installed"
          launch_log="$RUNNER_TEMP/scadmill-macos-launch.log"
          window_probe_source="$RUNNER_TEMP/scadmill-window-probe.swift"
          window_probe="$RUNNER_TEMP/scadmill-window-probe"
          mounted=0

          cleanup_dmg() {
            local status=$?
            local cleanup_status=0
            trap - EXIT
            set +e
            if [ "$mounted" -eq 1 ]; then
              hdiutil detach "$mount_point" || cleanup_status=1
            fi
            if [ "$status" -eq 0 ] && [ "$cleanup_status" -ne 0 ]; then
              printf '%s\n' 'DMG cleanup failed to detach the mounted candidate.' >&2
              exit "$cleanup_status"
            fi
            exit "$status"
          }

          mkdir -p "$mount_point" "$install_root"
          trap cleanup_dmg EXIT
          printf 'Y\n' | hdiutil attach \
            -nobrowse \
            -readonly \
            -mountpoint "$mount_point" \
            "$SCADMILL_DESKTOP_INSTALLER"
          mounted=1
          app_count="$(find "$mount_point" -maxdepth 1 -type d -name '*.app' | wc -l | tr -d ' ')"
          test "$app_count" -eq 1
          app="$(find "$mount_point" -maxdepth 1 -type d -name '*.app' -print -quit)"
          source_executable="$(find "$app/Contents/MacOS" -type f -perm +111 -print -quit)"
          test -n "$source_executable"
          source_executable_hash="$(shasum -a 256 "$source_executable" | awk '{print $1}')"
          ditto "$app" "$install_root/ScadMill.app"
          hdiutil detach "$mount_point"
          mounted=0
          executable="$(find "$install_root/ScadMill.app/Contents/MacOS" -type f -perm +111 -print -quit)"
          installed_executable_hash="$(shasum -a 256 "$executable" | awk '{print $1}')"
          test "$installed_executable_hash" = "$source_executable_hash"
          cat >"$window_probe_source" <<'SWIFT'
          import CoreGraphics
          import Foundation

          guard CommandLine.arguments.count == 2, let pid = Int32(CommandLine.arguments[1]) else {
            exit(EXIT_FAILURE)
          }
          let windows = CGWindowListCopyWindowInfo(
            [.optionOnScreenOnly, .excludeDesktopElements],
            kCGNullWindowID
          ) as? [[String: Any]] ?? []
          let ready = windows.contains { window in
            guard
              let owner = window[kCGWindowOwnerPID as String] as? NSNumber,
              let layer = window[kCGWindowLayer as String] as? NSNumber,
              let bounds = window[kCGWindowBounds as String] as? [String: NSNumber]
            else { return false }
            return owner.int32Value == pid
              && layer.intValue == 0
              && (bounds["Width"]?.doubleValue ?? 0) >= 200
              && (bounds["Height"]?.doubleValue ?? 0) >= 150
          }
          exit(ready ? EXIT_SUCCESS : EXIT_FAILURE)
          SWIFT
          swiftc "$window_probe_source" -o "$window_probe"
          "$executable" >"$launch_log" 2>&1 &
          pid=$!
          ready=0
          for _ in $(seq 1 60); do
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "$launch_log"
              exit 1
            fi
            if "$window_probe" "$pid"; then
              ready=1
              break
            fi
            sleep 0.5
          done
          test "$ready" -eq 1
          echo "visible_window_pid=$pid executable_sha256=$installed_executable_hash" >"$RUNNER_TEMP/scadmill-macos-window-evidence.txt"
          kill "$pid"
          wait "$pid" || true
          rm -rf "$install_root/ScadMill.app"
          test ! -e "$install_root/ScadMill.app"
      - name: Launch and remove Linux AppImage candidate
        if: runner.os == 'Linux'
        shell: bash
        run: |
          installed="$RUNNER_TEMP/ScadMill.AppImage"
          launch_log="$RUNNER_TEMP/scadmill-appimage-launch.log"
          extract_root="$RUNNER_TEMP/scadmill-appimage-extract"
          cp "$SCADMILL_DESKTOP_INSTALLER" "$installed"
          chmod +x "$installed"
          installed_hash="$(sha256sum "$installed" | cut -d ' ' -f 1)"
          expected_hash="$(cut -d ' ' -f 1 "$SCADMILL_DESKTOP_INSTALLER.sha256")"
          test "$installed_hash" = "$expected_hash"
          mkdir -p "$extract_root"
          (
            cd "$extract_root"
            "$installed" --appimage-extract >/dev/null
          )
          expected_runtime="$(find "$extract_root/squashfs-root" -type f -name scadmill -perm -111 -print -quit)"
          test -n "$expected_runtime"
          expected_runtime_hash="$(sha256sum "$expected_runtime" | cut -d ' ' -f 1)"
          diagnostics="$RUNNER_TEMP/scadmill-linux-window-diagnostics.txt"
          launcher_pid=""
          launcher_pgid=""
          xvfb_pid=""

          collect_descendants() {
            local parent_pid="$1"
            local child_pid
            while IFS= read -r child_pid; do
              [ -n "$child_pid" ] || continue
              printf '%s\n' "$child_pid"
              collect_descendants "$child_pid"
            done < <(pgrep -P "$parent_pid" 2>/dev/null || true)
          }

          write_diagnostics() {
            local reason="$1"
            {
              printf 'AppImage launch proof failed: %s\n' "$reason"
              printf 'launcher_pid=%s launcher_pgid=%s expected_runtime_sha256=%s appimage_sha256=%s\n' \
                "${launcher_pid:-unset}" "${launcher_pgid:-unset}" "$expected_runtime_hash" "$installed_hash"
              printf '%s\n' '--- process tree ---'
              ps -eo pid=,ppid=,stat=,comm=,args= --forest || true
              printf '%s\n' '--- launcher descendants ---'
              if [ -n "${launcher_pid:-}" ]; then
                while IFS= read -r candidate_pid; do
                  [ -n "$candidate_pid" ] || continue
                  candidate_runtime="$(readlink -f "/proc/$candidate_pid/exe" 2>/dev/null || true)"
                  candidate_hash=""
                  if [ -n "$candidate_runtime" ] && [ -r "$candidate_runtime" ]; then
                    candidate_hash="$(sha256sum "$candidate_runtime" 2>/dev/null | cut -d ' ' -f 1 || true)"
                  fi
                  printf 'pid=%s exe=%s sha256=%s\n' "$candidate_pid" "${candidate_runtime:-unavailable}" "${candidate_hash:-unavailable}"
                done < <(collect_descendants "$launcher_pid")
              fi
              printf '%s\n' '--- visible X11 windows ---'
              while IFS= read -r diagnostic_window_id; do
                [ -n "$diagnostic_window_id" ] || continue
                printf 'window_id=%s pid=%s title=%q geometry=%q\n' \
                  "$diagnostic_window_id" \
                  "$(xdotool getwindowpid "$diagnostic_window_id" 2>/dev/null || true)" \
                  "$(xdotool getwindowname "$diagnostic_window_id" 2>/dev/null || true)" \
                  "$(xdotool getwindowgeometry --shell "$diagnostic_window_id" 2>/dev/null | tr '\n' ' ' || true)"
              done < <(xdotool search --onlyvisible --name '.*' 2>/dev/null || true)
              printf '%s\n' '--- AppImage launch log ---'
              cat "$launch_log" 2>/dev/null || true
              printf '%s\n' '--- Xvfb log ---'
              cat "$RUNNER_TEMP/scadmill-xvfb.log" 2>/dev/null || true
            } >"$diagnostics" 2>&1
            cat "$diagnostics" >&2 || true
          }

          cleanup() {
            local status=$?
            local cleanup_status=0
            trap - EXIT
            set +e
            if [ -n "${launcher_pid:-}" ]; then
              mapfile -t remaining_descendants < <(collect_descendants "$launcher_pid")
              for (( index=${#remaining_descendants[@]} - 1; index >= 0; index-- )); do
                kill -TERM "${remaining_descendants[$index]}" 2>/dev/null || true
              done
            fi
            if [ -n "${launcher_pgid:-}" ]; then
              kill -TERM -- "-$launcher_pgid" 2>/dev/null || true
              sleep 0.5
              kill -KILL -- "-$launcher_pgid" 2>/dev/null || true
            fi
            if [ -n "${launcher_pid:-}" ]; then
              kill -TERM "$launcher_pid" 2>/dev/null || true
              wait "$launcher_pid" 2>/dev/null || true
            fi
            if [ -n "${xvfb_pid:-}" ]; then
              kill "$xvfb_pid" 2>/dev/null || true
              wait "$xvfb_pid" 2>/dev/null || true
            fi
            rm -f "$installed" || cleanup_status=1
            rm -rf "$extract_root" || cleanup_status=1
            if [ -e "$installed" ] || [ -e "$extract_root" ]; then
              cleanup_status=1
            fi
            if [ "$status" -eq 0 ] && [ "$cleanup_status" -ne 0 ]; then
              printf '%s\n' 'AppImage cleanup failed to remove the installed candidate or extraction tree.' >&2
              exit "$cleanup_status"
            fi
            exit "$status"
          }
          trap cleanup EXIT

          display=":99"
          Xvfb "$display" -screen 0 1280x800x24 >"$RUNNER_TEMP/scadmill-xvfb.log" 2>&1 &
          xvfb_pid=$!
          export DISPLAY="$display"
          x_ready=0
          for _ in $(seq 1 20); do
            if xdotool getmouselocation >/dev/null 2>&1; then
              x_ready=1
              break
            fi
            sleep 0.25
          done
          if [ "$x_ready" -ne 1 ]; then
            write_diagnostics "Xvfb did not accept X11 clients within 5 seconds."
            exit 1
          fi

          setsid env APPIMAGE_EXTRACT_AND_RUN=1 "$installed" >"$launch_log" 2>&1 &
          launcher_pid=$!
          observed_launcher_pgid="$(ps -o pgid= -p "$launcher_pid" 2>/dev/null | tr -d ' ' || true)"
          if [ -z "$observed_launcher_pgid" ] || [ "$observed_launcher_pgid" != "$launcher_pid" ]; then
            write_diagnostics "the exact AppImage launcher did not become its own isolated process group."
            exit 1
          fi
          launcher_pgid="$observed_launcher_pgid"
          ready=0
          runtime_pid=""
          runtime=""
          runtime_hash=""
          window_id=""
          window_title=""
          window_width=""
          window_height=""
          for _ in $(seq 1 60); do
            if ! kill -0 "$launcher_pid" 2>/dev/null; then
              write_diagnostics "the exact AppImage launcher exited before a verified window appeared."
              exit 1
            fi
            while IFS= read -r candidate_pid; do
              [ -n "$candidate_pid" ] || continue
              candidate_runtime="$(readlink -f "/proc/$candidate_pid/exe" 2>/dev/null || true)"
              [ -n "$candidate_runtime" ] && [ -r "$candidate_runtime" ] || continue
              candidate_hash="$(sha256sum "$candidate_runtime" | cut -d ' ' -f 1)"
              [ "$candidate_hash" = "$expected_runtime_hash" ] || continue
              while IFS= read -r candidate_window_id; do
                [ -n "$candidate_window_id" ] || continue
                window_id="$candidate_window_id"
                window_pid="$(xdotool getwindowpid "$window_id" 2>/dev/null || true)"
                window_title="$(xdotool getwindowname "$window_id" 2>/dev/null || true)"
                window_geometry="$(xdotool getwindowgeometry --shell "$window_id" 2>/dev/null || true)"
                window_width="$(printf '%s\n' "$window_geometry" | sed -n 's/^WIDTH=//p')"
                window_height="$(printf '%s\n' "$window_geometry" | sed -n 's/^HEIGHT=//p')"
                if [ "$window_pid" = "$candidate_pid" ] \
                  && [ "$window_title" = "ScadMill" ] \
                  && [[ "$window_width" =~ ^[1-9][0-9]*$ ]] \
                  && [[ "$window_height" =~ ^[1-9][0-9]*$ ]]; then
                  runtime_pid="$candidate_pid"
                  runtime="$candidate_runtime"
                  runtime_hash="$candidate_hash"
                  ready=1
                  break
                fi
                window_id=""
              done < <(xdotool search --all --onlyvisible --pid "$candidate_pid" --name '^ScadMill$' 2>/dev/null || true)
              if [ "$ready" -eq 1 ]; then
                break
              fi
            done < <(collect_descendants "$launcher_pid")
            if [ "$ready" -eq 1 ]; then
              break
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            write_diagnostics "no descendant exact-runtime process owned an exact-title visible positive-geometry window within 30 seconds."
            exit 1
          fi
          echo "launcher_pid=$launcher_pid visible_window_pid=$runtime_pid window_id=$window_id window_title=$window_title window_width=$window_width window_height=$window_height runtime_path=$runtime runtime_sha256=$runtime_hash appimage_sha256=$installed_hash" >"$RUNNER_TEMP/scadmill-linux-window-evidence.txt"
      - name: Upload platform installer
        if: always() && env.SCADMILL_DESKTOP_INSTALLER != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ env.SCADMILL_DESKTOP_INSTALLER }}
            ${{ env.SCADMILL_DESKTOP_INSTALLER }}.sha256
            ${{ runner.temp }}/scadmill-*-launch.log
            ${{ runner.temp }}/scadmill-*-window-evidence.txt
            ${{ runner.temp }}/scadmill-*-window-diagnostics.txt
            ${{ runner.temp }}/scadmill-xvfb.log
          if-no-files-found: error

  windows-installer:
    name: Windows setup
    runs-on: windows-latest
    env:
      SIGNING_CONFIGURED: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SIGNING_ENDPOINT != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Signing credential preflight (fail fast)
        if: env.SIGNING_CONFIGURED == 'true'
        shell: pwsh
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $body = @{
            client_id = $env:AZ_CLIENT_ID
            client_secret = $env:AZ_CLIENT_SECRET
            grant_type = "client_credentials"
            scope = "https://codesigning.azure.net/.default"
          }
          $uri = "https://login.microsoftonline.com/$($env:AZ_TENANT_ID)/oauth2/v2.0/token"
          try {
            $response = Invoke-RestMethod -Method Post -Uri $uri -Body $body -ContentType "application/x-www-form-urlencoded" -ErrorAction Stop
            if ($response.access_token) {
              Write-Host "Signing credential preflight passed."
              exit 0
            }
            Write-Error "The signing token endpoint returned no access token."
            exit 1
          } catch {
            $code = ""
            try { $code = ($_.ErrorDetails.Message | ConvertFrom-Json).error } catch {}
            if ($code -in @("invalid_client", "unauthorized_client", "invalid_grant")) {
              Write-Error "Signing credential preflight failed: $code."
              exit 1
            }
            Write-Warning "Signing credential preflight was inconclusive ($code); continuing to the signing service."
          }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Windows Sandbox exit-code handoff regression
        run: pnpm exec vitest run tests/scripts/packaged-desktop-evidence.test.ts -t "behaviorally waits"
      - name: Verify distributable third-party notices
        run: pnpm check:notices
      - name: Build offline NSIS setup
        shell: pwsh
        run: |
          rustc --version | Select-String '^rustc 1\.96\.0 '
          Push-Location src/desktop-shell
          pnpm exec tauri build --bundles nsis --ci -- --locked
          Pop-Location
      - name: Verify setup artifact and static Visual C++ runtime linkage
        shell: pwsh
        run: |
          $bundle = Join-Path $env:GITHUB_WORKSPACE "src/desktop-shell/src-tauri/target/release/bundle/nsis"
          $installers = @(Get-ChildItem -LiteralPath $bundle -Filter "*-setup.exe" -File)
          if ($installers.Count -ne 1) {
            Write-Error "Expected exactly one NSIS setup executable; found $($installers.Count)."
            exit 1
          }

          $application = Join-Path $env:GITHUB_WORKSPACE "src/desktop-shell/src-tauri/target/release/scadmill.exe"
          if (-not (Test-Path -LiteralPath $application -PathType Leaf)) {
            Write-Error "The bundled ScadMill application is missing."
            exit 1
          }

          $payloadDirectory = Join-Path $env:RUNNER_TEMP "scadmill-nsis-payload"
          New-Item -ItemType Directory -Path $payloadDirectory -Force | Out-Null
          & 7z e -y "-o$payloadDirectory" $installers[0].FullName "scadmill.exe"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Could not extract the exact application payload from setup."
            exit 1
          }
          $packagedApplications = @(Get-ChildItem -LiteralPath $payloadDirectory -Filter "scadmill.exe" -File)
          if ($packagedApplications.Count -ne 1) {
            Write-Error "Expected exactly one application payload; found $($packagedApplications.Count)."
            exit 1
          }
          $packagedApplication = $packagedApplications[0].FullName
          $packagedHash = Get-FileHash -Algorithm SHA256 -LiteralPath $packagedApplication
          Write-Host "Exact setup application payload SHA256: $($packagedHash.Hash)"

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $visualStudio = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
          $dumpbin = Get-ChildItem -LiteralPath $visualStudio -Filter dumpbin.exe -Recurse |
            Where-Object FullName -Match 'Hostx64\\x64\\dumpbin\.exe$' |
            Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($dumpbin)) {
            Write-Error "Could not locate the x64 Visual C++ import-table inspector."
            exit 1
          }

          $imports = (& $dumpbin /dependents $packagedApplication | Out-String)
          Write-Host $imports
          if ($imports -match 'VCRUNTIME140(?:_1)?\.dll') {
            Write-Error "ScadMill still depends on an external Visual C++ runtime."
            exit 1
          }
          "SCADMILL_INSTALLER=$($installers[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SCADMILL_BUILT_APP=$application" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SCADMILL_PACKAGED_APP=$packagedApplication" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Sign setup executable
        if: env.SIGNING_CONFIGURED == 'true'
        uses: Azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: "scottconverse-signing"
          certificate-profile-name: "ScottConversePublic"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          files: ${{ env.SCADMILL_INSTALLER }}
          timestamp-rfc3161: "http://timestamp.acs.microsoft.com"
      - name: Verify setup signature (fail closed)
        if: env.SIGNING_CONFIGURED == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature $env:SCADMILL_INSTALLER
          Write-Host "Status: $($signature.Status); Signer: $($signature.SignerCertificate.Subject)"
          if ($signature.Status -ne 'Valid') {
            Write-Error "Setup signature is not valid: $($signature.Status)."
            exit 1
          }
      - name: Record unsigned-artifact status
        if: env.SIGNING_CONFIGURED != 'true'
        shell: pwsh
        run: Write-Host "Signing credentials are unavailable; retaining the required unsigned CI artifact."
      - name: Hash exact setup bytes before lifecycle
        shell: pwsh
        run: |
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $env:SCADMILL_INSTALLER
          $sidecar = "$env:SCADMILL_INSTALLER.sha256"
          "$($hash.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($env:SCADMILL_INSTALLER))" |
            Set-Content -LiteralPath $sidecar -Encoding utf8NoBOM
          Get-Content -LiteralPath $sidecar
      - name: Install, launch, verify association, and uninstall exact setup
        shell: pwsh
        run: |
          $logRoot = Join-Path $env:RUNNER_TEMP "scadmill-windows-lifecycle"
          New-Item -ItemType Directory -Path $logRoot -Force | Out-Null
          $log = Join-Path $logRoot "installed-lifecycle.log"
          try {
            & ./scripts/windows/test-installed-lifecycle.ps1 `
              -Installer $env:SCADMILL_INSTALLER `
              -ExpectedApplication $env:SCADMILL_PACKAGED_APP `
              -ExpectedNotices ./THIRD-PARTY-NOTICES.txt *>&1 |
              Tee-Object -FilePath $log
          } catch {
            $_ | Format-List * -Force | Out-String | Add-Content -LiteralPath $log
            throw
          }
      - name: Upload Windows setup
        if: always() && env.SCADMILL_INSTALLER != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scadmill-windows-setup
          path: |
            ${{ env.SCADMILL_INSTALLER }}
            ${{ env.SCADMILL_INSTALLER }}.sha256
            ${{ runner.temp }}/scadmill-windows-lifecycle
          if-no-files-found: error
